<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Lọc & Tìm Kiếm Sinh Viên</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 650px; margin: 20px auto; }
        .input-group, .filter-group { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        input[type="text"], input[type="number"], select { padding: 8px; font-size: 14px; }
        button { padding: 8px 15px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        .row-yeu { background-color: #fff3cd; }
        .stats { font-weight: bold; font-size: 16px; margin-top: 15px; }
        #sortScore { cursor: pointer; user-select: none; }
        #sortScore:hover { background-color: #e0e0e0; }
        .empty-message { text-align: center; font-style: italic; color: #888; }
        hr { border: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <h2>Hệ Thống Quản Lý Điểm</h2>

    <div class="input-group">
        <input type="text" id="inputName" placeholder="Nhập họ tên...">
        <input type="number" id="inputScore" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="btnAdd">Thêm SV</button>
    </div>

    <hr>

    <div class="filter-group">
        <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm tên...">
        <select id="filterRank">
            <option value="All">Lọc: Tất cả</option>
            <option value="Giỏi">Giỏi</option>
            <option value="Khá">Khá</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Yếu">Yếu</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th id="sortScore" title="Click để sắp xếp">Điểm <span id="sortIcon"></span></th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentBody">
        </tbody>
    </table>

    <div class="stats">
        Đang hiển thị: <span id="totalStudents">0</span> SV | 
        Điểm trung bình: <span id="averageScore">0.0</span>
    </div>

    <script src="1.2BTHS4.js"></script>
</body>
</html>

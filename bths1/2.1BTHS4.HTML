<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Tài Khoản</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 450px; margin: 30px auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 10px; box-sizing: border-box; outline: none; border: 1px solid #ccc; border-radius: 4px;
        }
        .error-border { border-color: #dc3545 !important; background-color: #fff8f8; }
        .success-border { border-color: #28a745 !important; }
        .error { color: #dc3545; font-size: 13px; display: block; margin-top: 5px; }
        .radio-group, .checkbox-group { display: flex; align-items: center; gap: 15px; font-weight: normal; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #0056b3; }
        #successMsg { display: none; color: #28a745; font-weight: bold; text-align: center; font-size: 20px; padding: 40px 0; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="formContainer">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="registerForm" novalidate>
            
            <div class="form-group" id="group-fullname">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên">
            </div>

            <div class="form-group" id="group-email">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="name@domain.com">
            </div>

            <div class="form-group" id="group-phone">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="VD: 0912345678">
            </div>

            <div class="form-group" id="group-password">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>

            <div class="form-group" id="group-confirmPassword">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
            </div>

            <div class="form-group" id="group-gender">
                <label>Giới tính</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Nam"> Nam</label>
                    <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
                </div>
            </div>

            <div class="form-group" id="group-terms">
                <label class="checkbox-group">
                    <input type="checkbox" id="terms"> Tôi đồng ý với các điều khoản
                </label>
            </div>

            <button type="submit">Đăng Ký</button>
        </form>
    </div>

    <div id="successMsg"></div>

    <script src="2.1BTHS4.js"></script>
</body>
</html>
